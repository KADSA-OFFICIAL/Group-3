name: Feature or improvement
description: 새 기능, UX 개선, 게임 동작 변경을 제안합니다.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: 무엇을 추가하거나 개선해야 하나요?
      placeholder: 예) 플레이어가 Space 키로 점프할 수 있게 한다.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation or Problem
      description: 왜 필요한가요?
      placeholder: 플레이 경험, 조작감, 게임 규칙, 기술적 이유를 적어주세요.
    validations:
      required: true
  - type: textarea
    id: current_behavior
    attributes:
      label: Current Behavior
      description: 현재는 어떻게 동작하나요?
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: 구현 후에는 어떻게 동작해야 하나요?
    validations:
      required: true
  - type: textarea
    id: player_flow
    attributes:
      label: Player Flow
      description: 플레이어가 이 기능을 어떻게 경험해야 하나요?
      placeholder: |
        1. 플레이어가 ...
        2. 플레이어가 ...
        3. 게임이 ...
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: 어떤 씬, 스크립트, 에셋, UI, 게임 규칙이 영향을 받나요?
      placeholder: Player, Enemy, UI, Stage, Input, Audio, Docs 등
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: 이 이슈에서 일부러 다루지 않을 것은 무엇인가요?
      placeholder: 관련 없는 리팩터링, 밸런스 전체 개편, 새 UI 디자인 등
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: 완료를 증명할 구체적인 결과를 적어주세요.
      placeholder: |
        - 플레이어가 ...
        - 게임이 ...
        - 기존 기능이 ...
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification Plan
      description: 어떤 명령이나 수동 확인을 실행해야 하나요?
      placeholder: |
        - Godot에서 관련 씬 실행
        - 플레이어 입력 수동 확인
        - 기존 게임 흐름 확인
    validations:
      required: true
